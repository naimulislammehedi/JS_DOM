<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- DOM stands for Document Object Model. It is a JavaScript representation of an HTML page. The DOM allows JavaScript to read, change, add, or remove HTML elements. -->
    <h1>Hello World</h1>
    <p>I am learning <span id="topic">JavaScript</span></p>

    <script>
        const topic = document.getElementById("topic");
        topic.textContent = "JavaScript DOM"; 
    </script>
</body>

</html>
