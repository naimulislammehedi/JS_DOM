<!-- The document Object-->
 <!-- The document object represents the entire HTML document. Whenever you want to access or change anything in the webpage, you usually start with document. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Hello</h1>

    <script>
        console.log(document.getElementById("title")); 
        console.log(document.body); 
    </script>
</body>
</html>
